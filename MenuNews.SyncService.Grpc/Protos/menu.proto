syntax = "proto3";

import "google/protobuf/timestamp.proto";

option csharp_namespace = "MenuNews.SyncService.Grpc.Protos";

package menu;

service MenuService {
	rpc CreateMenuWithNews (CreateMenuWithNewsRequest) returns (MenuResponse);
	rpc GetMenuWithNews (GetMenuWithNewsRequest) returns (GetMenuWithNewsResponse);
}

message CreateNewsItemProto {
  string title        = 1;
  string slug         = 2;
  string summary      = 3;
  string content      = 4;
  string thumbnail    = 5;
  google.protobuf.Timestamp published_at = 6;
  int32  display_order = 7;
}

message CreateMenuWithNewsRequest {
  string name          = 1;
  string slug          = 2;
  int32  display_order = 3;
  repeated CreateNewsItemProto news_items = 4;
}

message NewsEmbeddedProto {
  string id            = 1;
  string title         = 2;
  string slug          = 3;
  string summary       = 4;
  string thumbnail     = 5;
  string status        = 6;
  google.protobuf.Timestamp published_at  = 7;
  int32  view_count    = 8;
  google.protobuf.Timestamp created_at    = 9;
  int32  display_order = 10;
}

message MenuResponse {
  string id            = 1;
  string name          = 2;
  string slug          = 3;
  int32  display_order = 4;
  bool   is_active     = 5;
  google.protobuf.Timestamp created_at    = 6;
}

message MenuDetailResponse {
  string id            = 1;
  string name          = 2;
  string slug          = 3;
  int32  display_order = 4;
  bool   is_active     = 5;
  google.protobuf.Timestamp created_at    = 6;
  repeated NewsEmbeddedProto news = 7;
}

message GetMenuWithNewsRequest {}

message GetMenuWithNewsResponse {
  repeated MenuDetailResponse menus = 1;
}
